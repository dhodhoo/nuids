services:
  db:
    image: mysql:8.0
    container_name: nuids-db
    restart: unless-stopped
    env_file: ./docker/.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: nuids_fix
      MYSQL_USER: nuids
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./nuids_fix.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: nuids-backend
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    environment:
      CI_ENV: development
      DB_HOST: db
      DB_USERNAME: nuids
      DB_PASSWORD: Ridho5522#
      DB_NAME: nuids_fix
      AI_API_URL: https://deepseek-api.nexaworks.me/api/nuids
      AI_API_KEY: nuids-dev-key-2024
    ports:
      - "8081:80"
    depends_on:
      - db

  frontend:
    image: nginx:alpine
    container_name: nuids-frontend
    restart: unless-stopped
    volumes:
      - ./dist:/usr/share/nginx/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
